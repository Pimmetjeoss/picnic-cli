version: 2
project_name: picnic-pp-cli
changelog:
  disable: true
builds:
  - id: picnic-pp-cli
    main: ./cmd/picnic-pp-cli
    binary: picnic-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X picnic-pp-cli/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: picnic-pp-mcp
    main: ./cmd/picnic-pp-mcp
    binary: picnic-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: picnic-pp-cli
    repository:
      owner: pimmetjeoss
      name: homebrew-tap
    homepage: "https://github.com/pimmetjeoss/picnic-pp-cli"
    description: "Every Picnic wrapper feature, plus a local SQLite store, offline FTS, and reorder/spend-trend/slot-watch that no..."
    install: |
      bin.install "picnic-pp-cli"
      bin.install "picnic-pp-mcp"
